# Environment Dimensions & Physics
resolution: 0.1
dt: 0.1
max_steps: 1000
max_accel: 1.0

# Sensor Settings
n_rays: 12
max_range: 5.0

# Communication & Tracking
max_comm_range: 3.0
goal_speed: 1.0

# Reward Weights (Tune these to change behavior)
weights:
  momentum_penalty: 0.25
  jerk_penalty_multiplier: 0.5
  los_penalty: 10.0
  connectivity_bonus: 1.0
  out_of_range_penalty: 5.0
  collision_penalty: 400.0
  donut_reward_scale: 2.0
  approach_progress_scale: 1.0
  velocity_alignment_reward: 0.1
